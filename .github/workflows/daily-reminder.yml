            {id:63,date:"2026-06-20",time:"18:00",home:"USA",away:"Neuseeland"},
            {id:64,date:"2026-06-21",time:"18:00",home:"Mexiko",away:"Kenia"},
            {id:65,date:"2026-06-22",time:"18:00",home:"Spanien",away:"Chile"},
            {id:66,date:"2026-06-22",time:"18:00",home:"Kolumbien",away:"Sued Korea"},
            {id:67,date:"2026-06-21",time:"18:00",home:"England",away:"Venezuela"},
            {id:68,date:"2026-06-21",time:"18:00",home:"Portugal",away:"Malaysia"},
            {id:69,date:"2026-06-22",time:"18:00",home:"Argentinien",away:"Oesterreich"},
            {id:70,date:"2026-06-23",time:"18:00",home:"Niederlande",away:"Cuba"},
            {id:71,date:"2026-06-23",time:"18:00",home:"Neuseeland",away:"Ungarn"},
            {id:72,date:"2026-06-23",time:"18:00",home:"Haiti",away:"Ecuador"},
          ];

          async function main() {
            const now = new Date();
            const in24h = new Date(now.getTime() + 24 * 60 * 60 * 1000);

            // Spiele der nächsten 24h finden
            const upcoming = GAMES.filter(g => {
              const [h, m] = g.time.split(':').map(Number);
              const ko = new Date(`${g.date}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00Z`);
              return ko > now && ko < in24h;
            });

            if (upcoming.length === 0) {
              console.log('Keine Spiele in den nächsten 24h — nichts zu tun.');
              return;
            }
            console.log(`${upcoming.length} Spiele morgen:`, upcoming.map(g => g.home + ' vs ' + g.away).join(', '));

            // Vorhandene Tipps von Supabase laden
            const gameIds = upcoming.map(g => g.id).join(',');
            const res = await fetch(
              `${SUPABASE_URL}/rest/v1/tips?select=player,game_id&game_id=in.(${gameIds})`,
              { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
            );
            const tips = await res.json();
            const tipped = new Set(tips.map(t => `${t.player}_${t.game_id}`));

            // Pro Spieler prüfen & Push schicken
            for (const player of PLAYERS) {
              const missing = upcoming.filter(g => !tipped.has(`${player}_${g.id}`));
              if (missing.length === 0) {
                console.log(`✓ ${player} hat alle Spiele getippt`);
                continue;
              }
              const names = missing.map(g => `${g.home} vs ${g.away}`).join(', ');
              const body = `${missing.length} Spiel${missing.length > 1 ? 'e' : ''} noch ohne Tipp: ${names}`;
              console.log(`📲 Sende an ${player}: ${body}`);

              const push = await fetch('https://onesignal.com/api/v1/notifications', {
                method: 'POST',
                headers: {
                  'Authorization': `Basic ${OS_API_KEY}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  app_id: OS_APP_ID,
                  filters: [{ field: 'tag', key: 'player', relation: '=', value: player }],
                  headings: { de: `⏰ WM Tippspiel — ${player}` },
                  contents: { de: body },
                  url: 'https://mbclaude.github.io/wm2026-tippspiel/',
                }),
              });
              const result = await push.json();
              console.log(`   → ${result.id ? '✅ gesendet (' + result.recipients + ' Geräte)' : '❌ ' + JSON.stringify(result.errors)}`);
            }
          }

          main().catch(console.error);
          EOF
          node reminder.js
