name: Daily 18:00 Tipp-Erinnerung

on:
  schedule:
    - cron: '0 16 * * *'   # 16:00 UTC = 18:00 MESZ (Sommer) / 17:00 MEZ (Winter)
  workflow_dispatch:         # Manuell auslösbar zum Testen

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Sende Push-Benachrichtigungen für nicht getippte Spiele
        env:
          SUPABASE_URL: https://zewalniirmsuclbcdrlv.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          cat << 'EOF' > reminder.js
